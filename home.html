<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="./image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex">
                <div class="logo w-[60px] ">
                    <img src="./assets/logo.png" alt="">

                </div>
                <div class="balance-info">
                    <h2 class="text-xl font-bold">$<span id="balance">45000</span></h2>
                    <p class="text-neutral-400">Available Balance</p>
                </div>
            </div>

            <div class="Right">
                <a href="./index.html" class="btn btn-soft"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>logout</a>
            </div>

        </section>
    </header>


    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral-400">Enjoy Easy and convenient Financial services with us. Cashout charge is low</p>


        <div class="buttons grid grid-cols-3 gap-3">
            <button id="show-add-money"
                class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Add Money</p>
            </button>
            <button id="show-cashout"
                class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Cashout</p>
            </button>
            <button class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Send Money</p>
            </button>
            <button class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Get Bonus</p>
            </button>
            <button class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Pay Bill</p>
            </button>
            <button class="btn flex-col items-center justify-center bg-base h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p> Transactions</p>
            </button>

        </div>

    </section>

    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select Bank</label>
                    <select id="add-money-bank" class="select bg-base-200 rounded-full w-full">

                        <option disabled selected>Select Bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="CITY">City Bank</option>
                    </select>
                    <br>
                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="add-money-number" maxlength="11" minlength="11" type="email"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Bank 11 digit Phone number" />
                    <br>

                    <label class="label text-neutral font-bold">Amount to add</label>
                    <input id="add-money-amount" maxlength="11" minlength="11" type="number"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Amount to add" />
                    <br>

                    <label class="label text-neutral font-bold">Password</label>
                    <input id="add-money-pin" maxlength="4" type="password"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter Pin" />
                    <br>

                    <button id="add-money-btn" class="btn mt-4 rounded-full border-none shadow-md btn btn-primary">Add
                        Money</button>
                </fieldset>
            </div>
        </div>
    </section>


    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Cashout</h2>
        <div class="form pt-10">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold">Agent Number</label>
                        <input id="agent-number" maxlength="11" minlength="11" type="email"
                            class="input rounded-full bg-base-200 w-full"
                            placeholder="Enter Agent 11 digit Phone number" />
                        <br>

                        <label class="label text-neutral font-bold">Amount</label>
                        <input id="cashout-amount" maxlength="11" minlength="11" type="number"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter Amount" />
                        <br>

                        <label class="label text-neutral font-bold">Password</label>
                        <input id="cashout-pin" maxlength="4" type="password"
                            class="input rounded-full bg-base-200 w-full" placeholder="Enter Pin" />
                        <br>

                        <button id="cashout-btn"
                            class="btn mt-4 rounded-full border-none shadow-md btn btn-primary">Withdraw Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>
    <script src="./show-hide.js"></script>
    <script src="./machine.js"></script>
    <script src="./addMoney.js"></script>
    <script src="./cashout.js"></script>


</body>

</html>
